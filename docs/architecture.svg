<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-dash" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <linearGradient id="box-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="box-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="box-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#f3e8ff"/>
    </linearGradient>
    <linearGradient id="box-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="box-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="100%" stop-color="#ffe4e6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">AnvilNotify Architecture</text>

  <!-- ── Row 1: Business Service → Outbox Worker → RabbitMQ ── -->
  <rect x="30" y="60" width="160" height="70" rx="6" fill="url(#box-blue)" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="110" y="87" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Business Service</text>
  <text x="110" y="105" text-anchor="middle" font-size="11" fill="#3b82f6">INSERT INTO outbox</text>
  <text x="110" y="120" text-anchor="middle" font-size="10" fill="#64748b">(same DB transaction)</text>

  <line x1="190" y1="95" x2="270" y2="95" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="280" y="60" width="150" height="70" rx="6" fill="url(#box-green)" stroke="#86efac" stroke-width="1.5"/>
  <text x="355" y="87" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">Outbox Worker</text>
  <text x="355" y="105" text-anchor="middle" font-size="11" fill="#22c55e">polls outbox table</text>
  <text x="355" y="120" text-anchor="middle" font-size="10" fill="#64748b">(crate: outbox)</text>

  <line x1="430" y1="95" x2="510" y2="95" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="520" y="55" width="160" height="80" rx="6" fill="url(#box-amber)" stroke="#fde68a" stroke-width="1.5"/>
  <text x="600" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">RabbitMQ</text>
  <text x="600" y="100" text-anchor="middle" font-size="11" fill="#d97706">email.requested</text>
  <text x="600" y="118" text-anchor="middle" font-size="10" fill="#64748b">exchange: anvil-notify</text>

  <!-- ── RabbitMQ → Consumer arrow ── -->
  <line x1="600" y1="135" x2="600" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="615" y="178" font-size="10" fill="#64748b" font-style="italic">AMQP</text>

  <!-- ── Row 2: anvil-notify consumer block ── -->
  <rect x="30" y="215" width="750" height="155" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4"/>
  <text x="405" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">anvil-notify consumer (crate: consumer)</text>

  <!-- Consumer sub-boxes -->
  <rect x="50" y="255" width="130" height="44" rx="4" fill="url(#box-blue)" stroke="#93c5fd" stroke-width="1"/>
  <text x="115" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Idempotency Guard</text>
  <text x="115" y="291" text-anchor="middle" font-size="10" fill="#64748b">(PostgreSQL)</text>

  <rect x="195" y="255" width="130" height="44" rx="4" fill="url(#box-blue)" stroke="#93c5fd" stroke-width="1"/>
  <text x="260" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Template Renderer</text>
  <text x="260" y="291" text-anchor="middle" font-size="10" fill="#64748b">(minijinja)</text>

  <rect x="340" y="255" width="120" height="44" rx="4" fill="url(#box-blue)" stroke="#93c5fd" stroke-width="1"/>
  <text x="400" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Recipient Filter</text>
  <text x="400" y="291" text-anchor="middle" font-size="10" fill="#64748b">(block/allow)</text>

  <rect x="475" y="255" width="120" height="44" rx="4" fill="url(#box-blue)" stroke="#93c5fd" stroke-width="1"/>
  <text x="535" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Rate Limiter</text>
  <text x="535" y="291" text-anchor="middle" font-size="10" fill="#64748b">(token bucket)</text>

  <rect x="610" y="255" width="150" height="44" rx="4" fill="url(#box-blue)" stroke="#93c5fd" stroke-width="1"/>
  <text x="685" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Retry / DLQ</text>
  <text x="685" y="291" text-anchor="middle" font-size="10" fill="#64748b">(exponential backoff)</text>

  <!-- ── Consumer → SMTP/Webhook ── -->
  <line x1="405" y1="310" x2="405" y2="350" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Row 2.5: EmailSender ── -->
  <rect x="280" y="355" width="250" height="44" rx="6" fill="url(#box-green)" stroke="#86efac" stroke-width="1.5"/>
  <text x="405" y="374" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">EmailSender</text>
  <text x="405" y="391" text-anchor="middle" font-size="10" fill="#22c55e">SMTP (lettre) or Webhook (reqwest)</text>

  <!-- ── Row 3: HTTP API ── -->
  <rect x="30" y="425" width="350" height="100" rx="6" fill="url(#box-purple)" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="205" y="450" text-anchor="middle" font-size="14" font-weight="bold" fill="#6b21a8">anvil-notify HTTP API (crate: api)</text>
  <text x="205" y="470" text-anchor="middle" font-size="11" fill="#a855f7">GET/POST /emails/* &amp; /templates/*</text>
  <text x="205" y="488" text-anchor="middle" font-size="11" fill="#a855f7">CRUD /admin/blocklist</text>
  <text x="205" y="506" text-anchor="middle" font-size="11" fill="#a855f7">GET /health, GET /ready</text>

  <!-- MCP Server box -->
  <rect x="420" y="425" width="210" height="100" rx="6" fill="url(#box-rose)" stroke="#fecdd3" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="525" y="450" text-anchor="middle" font-size="14" font-weight="bold" fill="#be123c">MCP Server (crate: mcp)</text>
  <text x="525" y="470" text-anchor="middle" font-size="11" fill="#f43f5e">POST /mcp — send_email</text>
  <text x="525" y="488" text-anchor="middle" font-size="11" fill="#f43f5e">list_templates, health_check</text>
  <text x="525" y="506" text-anchor="middle" font-size="11" fill="#f43f5e">get_server_info, check_status</text>

  <!-- MCP feature badge -->
  <text x="525" y="430" text-anchor="middle" font-size="9" fill="#64748b">(cargo feature: mcp)</text>

  <!-- HTTP API → MCP connection (same router) -->
  <line x1="380" y1="475" x2="420" y2="475" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrow-dash)"/>
  <text x="400" y="467" text-anchor="middle" font-size="9" fill="#94a3b8">nest /mcp</text>

  <!-- ── Clients ── -->
  <!-- MCP Client (opencode) -->
  <rect x="670" y="440" width="210" height="50" rx="6" fill="#fefce8" stroke="#fef08a" stroke-width="1.5"/>
  <text x="775" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">MCP Client</text>
  <text x="775" y="479" text-anchor="middle" font-size="11" fill="#ca8a04">opencode, IDE extensions</text>

  <line x1="630" y1="465" x2="670" y2="465" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- API Client -->
  <rect x="670" y="380" width="210" height="40" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="775" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">REST Client</text>
  <text x="775" y="415" text-anchor="middle" font-size="10" fill="#64748b">curl, Postman, anctl</text>

  <line x1="630" y1="400" x2="560" y2="400" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="400" x2="560" y2="475" stroke="#64748b" stroke-width="1" stroke-dasharray="3"/>
  <line x1="560" y1="475" x2="630" y2="475" stroke="#64748b" stroke-width="1" stroke-dasharray="3"/>

  <!-- ── Shared DB ── -->
  <rect x="30" y="555" width="840" height="44" rx="6" fill="url(#box-amber)" stroke="#fde68a" stroke-width="1.5"/>
  <text x="450" y="577" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">PostgreSQL — notification_delivery, notification_log, notification_template, block_list</text>
  <text x="450" y="593" text-anchor="middle" font-size="10" fill="#64748b">Shared across: consumer, HTTP API, MCP server, outbox worker</text>

  <line x1="205" y1="525" x2="450" y2="555" stroke="#64748b" stroke-width="1" stroke-dasharray="3" marker-end="url(#arrow)"/>
  <line x1="525" y1="525" x2="450" y2="555" stroke="#64748b" stroke-width="1" stroke-dasharray="3" marker-end="url(#arrow)"/>
  <line x1="355" y1="399" x2="420" y2="555" stroke="#64748b" stroke-width="1" stroke-dasharray="3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <text x="30" y="618" font-size="10" fill="#94a3b8">Dashed borders indicate optional feature-gated components</text>
</svg>
